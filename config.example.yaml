# 配置示例文件
# 复制此文件为 config/default.yaml 并修改以下配置

speaker:
  userId: "your_user_id"
  password: "your_password"
  passToken: ""
  did: "小爱触屏音箱"
openai:
  model: gpt-4o-mini
  baseURL: https://api.openai.com/v1
  apiKey: sk-xxx...
prompt:
  system: 你是一个智能助手小爱同学。请用友好的语气回答用户的问题。
callAIKeywords:
  - "请"
  - "你"
memory:
  enabled: false
  maxRecords: 100
ttsCommand:
  - 5
  - 1
